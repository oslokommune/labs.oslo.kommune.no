<!--
  /*
    Images block
    Wants data in ${data}
  */
-->

<div data-th-if="${data.images}">
  <div data-th-if="${#lists.size(data.images) == 1}" data-th-remove="tag">
    <!-- /* Layout for single image */ -->
    <a
      class="gallery"
      data-th-object="${data.images[0]}"
      data-th-href="*{src}"
      data-th-data-pswp-width="*{width}"
      data-th-data-pswp-height="*{height}"
    >
      <figure class="pkt-grid">
        <div
          class="pkt-cell is-paddingless-top-bottom"
          data-th-classappend="${data.isFullWidth} ? 'pkt-cell--span12' : 'labs-article-col'"
        >
          <img
            loading="lazy"
            data-th-width="*{width}"
            data-th-height="*{height}"
            data-th-src="*{src}"
            data-th-srcset="*{srcSet}"
            data-th-alt-title="*{alt}"
            data-th-sizes="${data.isFullWidth} ?
            '(max-width:1087px) 95vw, (max-width:1279px) 960px, (max-width:1471px) 1152px, 1344px' :
            '(max-width:768px) 95vw, (max-width:1087px) 62vw, 600px'"
          />
        </div>
        <figcaption
          data-th-if="*{caption}"
          data-th-utext="*{caption}"
          class="pkt-cell o-block-images__caption pswp-caption-content"
          data-th-classappend="${data.isFullWidth} ? 'labs-article-col' : 'o-block-images__caption--bottom labs-article-caption'"
        >
          Caption
        </figcaption>
      </figure>
    </a>
  </div>

  <div data-th-if="${#lists.size(data.images) == 2}" data-th-remove="tag">
    <!-- /* Layout for two images */ -->
    <div class="pkt-grid o-block-images--two">
      <a
        class="gallery pkt-cell labs-article-col"
        data-th-object="${data.images[0]}"
        data-th-href="*{src}"
        data-th-data-pswp-width="*{width}"
        data-th-data-pswp-height="*{height}"
      >
        <figure>
          <img
            loading="lazy"
            data-th-width="*{width}"
            data-th-height="*{height}"
            data-th-src="*{src}"
            data-th-srcset="*{srcSet}"
            data-th-alt-title="*{alt}"
            data-th-sizes="${data.isFullWidth} ?
          '(max-width:768px) 95vw, (max-width:1087px) 62vw, (max-width:1279px) 631px, (max-width:1471px) 758px, 771px' :
          '(max-width:768px) 95vw, (max-width:1087px) 62vw, (max-width:1279px) 631px, (max-width:1471px) 660px, 657px'"
          />
          <figcaption
            data-th-if="*{caption}"
            class="o-block-images__caption pswp-caption-content"
            data-th-utext="*{caption}"
          >
            Caption
          </figcaption>
        </figure>
      </a>

      <a
        class="gallery pkt-cell pkt-cell--span12 pkt-cell--span4-tablet-up o-block-images--offset"
        data-th-object="${data.images[1]}"
        data-th-href="*{src}"
        data-th-data-pswp-width="*{width}"
        data-th-data-pswp-height="*{height}"
      >
        <figure>
          <img
            loading="lazy"
            data-th-width="*{width}"
            data-th-height="*{height}"
            data-th-src="*{src}"
            data-th-srcset="*{srcSet}"
            data-th-alt-title="*{alt}"
            data-th-sizes="${data.isFullWidth} ?
          '(max-width:768px) 95vw, (max-width:1087px) 30vw, (max-width:1279px) 301px, (max-width:1471px) 364px, 543px' :
          '(max-width:768px) 95vw, (max-width:1087px) 30vw, (max-width:1279px) 301px, (max-width:1471px) 364px, 428px'"
          />
          <figcaption
            data-th-if="*{caption}"
            class="o-block-images__caption pswp-caption-content"
            data-th-utext="*{caption}"
          >
            Caption
          </figcaption>
        </figure>
      </a>
    </div>
  </div>

  <div data-th-if="${#lists.size(data.images) == 3}" data-th-remove="tag">
    <!-- /* Layout for three images */ -->
    <div class="pkt-grid">
      <div class="pkt-cell pkt-cell--span12" data-th-classappend="${data.isFullWidth} ? '' : 'pkt-cell--span10-tablet-big-up'">
        <div class="pkt-grid">
          <a
            class="gallery pkt-cell pkt-cell--span12 pkt-cell--span4-tablet-up"
            data-th-each="image: ${data.images}"
            data-th-object="${image}"
            data-th-href="*{src}"
            data-th-data-pswp-width="*{width}"
            data-th-data-pswp-height="*{height}"
          >
            <figure>
              <img
                loading="lazy"
                data-th-width="*{width}"
                data-th-height="*{height}"
                data-th-src="*{src}"
                data-th-srcset="*{srcSet}"
                data-th-alt-title="*{alt}"
                data-th-sizes="${data.isFullWidth} ?
              '(max-width:768px) 95vw, (max-width:1087px) 30vw, (max-width:1279px) 301px, (max-width:1471px) 364px, 352px' :
              '(max-width:768px) 95vw, (max-width:1087px) 30vw, (max-width:1279px) 301px, (max-width:1471px) 364px, 428px'"
              />
              <figcaption
                data-th-if="*{caption}"
                class="o-block-images__caption pswp-caption-content"
                data-th-utext="*{caption}"
              >
                Caption
              </figcaption>
            </figure>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
