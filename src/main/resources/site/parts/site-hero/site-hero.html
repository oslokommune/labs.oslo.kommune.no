<section class="section home-header">
  <div class="pkt-container">
    <div class="pkt-grid home-header__columns">
      <img
        class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up home-header__image-column"
        data-th-object="${image}"
        data-th-width="*{width}"
        data-th-height="*{height}"
        data-th-src="*{src}"
        data-th-srcset="*{srcSet}"
        data-th-alt-title="*{alt}"
        data-th-sizes="'(max-width:768px) 95vw, (max-width:1087px) 512px, 660px'"
      />

      <div class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up home-header__text-column">
        <h1 data-th-if="${heading}" class="pkt-txt-36 pkt-txt-54--tablet-up" data-th-text="${heading}"></h1>
        <p data-th-if="${subheading}" data-th-text="${subheading}"></p>
        <p class="home-header__links">
          <a
            data-th-if="${primary}"
            data-th-href="${primary.url}"
            data-th-text="${primary.label}"
            class="labs-button labs-button--primary"
            >Call to Action</a
          >
          <a
            data-th-if="${secondary}"
            data-th-href="${secondary.url}"
            data-th-text="${secondary.label}"
            class="labs-button"
            >Call to Action</a
          >
        </p>
      </div>
    </div>
  </div>
</section>
