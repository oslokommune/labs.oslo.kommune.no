<div class="section">
  <div class="pkt-container">
    <div class="pkt-grid">
      <div class="pkt-cell pkt-cell--span12">
        <h1 class="pkt-txt-36 pkt-txt-54--tablet-up" data-th-text="${name}"></h1>
      </div>
    </div>
    <div class="pkt-grid">
      <div
        class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up pkt-cell--span4-tablet-big-up"
        data-th-each="article : ${articles}"
        data-th-with="item=${article}"
        data-th-insert="/site/snippets/article-card.html :: card('small')"
      ></div>
    </div>
  </div>
</div>
