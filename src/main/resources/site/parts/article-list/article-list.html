<div data-th-remove="tag">
  <div data-th-if="${!live && !hasContent}">
    <h3>Unconfigured Article list part</h3>
  </div>
  <div data-th-if="${hasContent}" data-th-remove="tag">
    <section class="section">
      <div class="pkt-container">
        <div data-th-if="${presentationMode == 'normal'}" data-th-remove="tag">
          <h2 data-th-if="heading" data-th-text="${heading}" class="pkt-txt-22 pkt-txt-30--tablet-up"></h2>
          <div
            data-th-if="${featured}"
            data-th-each="article : ${featured}"
            data-th-with="item=${article}"
            data-th-insert="/site/snippets/article-card.html :: card('big')"
          ></div>
          <div data-th-if="${articles}" class="pkt-grid">
            <div
              class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up pkt-cell--span4-tablet-big-up"
              data-th-each="article : ${articles}"
              data-th-with="item=${article}"
              data-th-insert="/site/snippets/article-card.html :: card('small')"
            ></div>
          </div>
        </div>

        <div data-th-if="${presentationMode == 'compact'}" data-th-remove="tag">
          <h2 data-th-if="${heading}" data-th-text="${heading}" class="pkt-txt-22 pkt-txt-30--tablet-up"></h2>
          <ul data-th-if="${featured}" class="pkt-grid">
            <li
              data-th-each="article, i: ${featured}"
              data-th-object="${article}"
              class="pkt-cell pkt-cell--span12 experiment__tile has-text-white experiment__tile--large"
            >
              <a data-th-href="*{path}">
                <div class="experiment__imagecontainer">
                  <picture>
                    <source
                      data-th-if="*{image.portrait}"
                      data-th-width="*{image.width}"
                      data-th-height="*{image.height}"
                      media="(max-width:768px)"
                      data-th-srcset="*{image.portrait.srcSet}"
                      sizes="'95vw'"
                    />
                    <img
                      loading="lazy"
                      class="experiment__image"
                      data-th-src="*{image.src}"
                      data-th-width="*{image.width}"
                      data-th-height="*{image.height}"
                      data-th-srcset="*{image.srcSet}"
                      data-th-alt-title="*{image.alt}"
                      data-th-sizes="'(max-width:1087px) 95vw, (max-width:1279px) 960px, (max-width:1471px) 1152px, 1344px'"
                    />
                  </picture>
                  <!-- Video overlay - vises kun når type er 'video' -->
                  <div data-th-if="*{type == 'video'}" class="experiment__tile__video-overlay">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="experiment__tile__video-icon">
                      <circle
                        cx="50"
                        cy="50"
                        r="48"
                        fill="white"
                        opacity="0.8"
                        stroke="currentColor"
                        stroke-width="2"
                      />
                      <path d="M40 30L70 50L40 70Z" fill="currentColor" />
                    </svg>
                  </div>
                </div>
                <div data-th-if="*{categories}" class="experiment__tag">
                  <ol class="categories">
                    <li data-th-each="category, i: *{categories}" data-th-object="${category}">
                      <span data-th-text="*{heading}">Category</span>
                    </li>
                  </ol>
                </div>
                <h3 class="pkt-txt-22 pkt-txt-30--tablet-up experiment__heading has-text-white"><span data-th-text="*{heading}"></span></h3>
              </a>
            </li>
          </ul>
          <ul data-th-if="${articles}" class="pkt-grid">
            <li
              data-th-each="article, i: ${articles}"
              data-th-object="${article}"
              class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up pkt-cell--span4-tablet-big-up experiment__tile has-text-white"
            >
              <a data-th-href="*{path}">
                <div class="experiment__imagecontainer">
                  <picture>
                    <source
                      data-th-if="*{image.portrait}"
                      data-th-width="*{image.width}"
                      data-th-height="*{image.height}"
                      media="(max-width:768px)"
                      data-th-srcset="*{image.portrait.srcSet}"
                      sizes="'95vw'"
                    />
                    <img
                      loading="lazy"
                      class="experiment__image"
                      data-th-src="*{image.src}"
                      data-th-width="*{image.width}"
                      data-th-height="*{image.height}"
                      data-th-srcset="*{image.srcSet}"
                      data-th-alt-title="*{image.alt}"
                      data-th-sizes="'(max-width:768px) 95vw, (max-width:1087px) 30vw, (max-width:1279px) 301px, (max-width:1471px) 364px, 543px'"
                    />
                  </picture>
                  <!-- Video overlay - vises kun når type er 'video' -->
                  <div data-th-if="*{type == 'video'}" class="experiment__tile__video-overlay">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="experiment__tile__video-icon">
                      <circle
                        cx="50"
                        cy="50"
                        r="48"
                        fill="white"
                        opacity="0.8"
                        stroke="currentColor"
                        stroke-width="2"
                      />
                      <path d="M40 30L70 50L40 70Z" fill="currentColor" />
                    </svg>
                  </div>
                </div>
                <div data-th-if="*{categories}" class="experiment__tag">
                  <ol class="categories">
                    <li data-th-each="category, i: *{categories}" data-th-object="${category}">
                      <span data-th-text="*{heading}">Category</span>
                    </li>
                  </ol>
                </div>
                <h3 class="pkt-txt-22 pkt-txt-30--tablet-up experiment__heading has-text-white"><span data-th-text="*{heading}"></span></h3>
              </a>
            </li>
          </ul>
        </div>

        <div data-th-if="${paging}" data-th-insert="/site/snippets/paging">Paging</div>

        <div data-th-if="${seeAllLink}" class="pkt-grid">
          <a
            class="pkt-cell pkt-cell--span12 pkt-txt-center is-paddingless-top"
            data-th-href="${seeAllLink.href}"
            data-th-text="${seeAllLink.text}"
            >See all</a
          >
        </div>
      </div>
    </section>
  </div>
</div>
