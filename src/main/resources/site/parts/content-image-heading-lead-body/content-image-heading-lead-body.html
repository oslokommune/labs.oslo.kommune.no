<div data-th-remove="tag">
  <article>
    <header class="category-hero" data-th-classappend="${image} ? '' : ' hero--no-image'">
      <div class="category-hero__imgwrapper pkt-container" data-th-if="*{image}">
        <img
          data-th-if="*{image}"
          data-th-src="*{image.src}"
          data-th-srcset="*{image.srcSet}"
          data-th-sizes="'100vw'"
          data-th-alt-title="*{image.alt}"
          class="category-hero__img"
        />
        <h1 class="category-hero__heading pkt-txt-36 pkt-txt-54--tablet-up"><span data-th-text="${heading}"></span></h1>
      </div>

      <div class="section" data-th-unless="${hideLead}">
        <div class="pkt-container">
          <div class="pkt-grid">
            <div class="pkt-cell labs-article-col--centered">
              <h1 class="pkt-txt-36 pkt-txt-54--tablet-up" data-th-text="${heading}" data-th-unless="*{image}"></h1>
              <p class="lead" data-th-text="${lead}">Lead</p>
            </div>
          </div>
        </div>
      </div>

      <div class="section is-paddingless-top">
        <div class="pkt-container labs-prose">
          <div class="pkt-grid">
            <div class="pkt-cell labs-article-col--centered" data-th-utext="${body}"></div>
          </div>
        </div>
      </div>
    </header>
  </article>
</div>
