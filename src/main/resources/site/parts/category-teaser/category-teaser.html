<section class="section category-teaser">
  <div class="pkt-container">
    <h4 data-th-if="${heading}" class="pkt-txt-18-medium pkt-txt-24-medium--tablet-up pkt-txt-center" data-th-text="${heading}"></h4>
    <div class="pkt-grid">
      <a
        data-th-each="category : ${categories}"
        data-th-object="${category}"
        class="pkt-cell pkt-cell--span6 pkt-cell--span3-tablet-up category-teaser__item"
        data-th-style="'background-color:' + *{color}"
        data-th-href="*{link.href}"
      >
        <img
          loading="lazy"
          data-th-if="*{image}"
          data-th-width="*{image.width}"
          data-th-height="*{image.height}"
          data-th-src="*{image.src}"
          data-th-srcset="*{image.srcSet}"
          data-th-sizes="200px"
          data-th-alt="*{image.alt}"
          class="category-teaser__image"
        />
        <span class="category-teaser__text"><span data-th-text="*{label}"></span></span>
      </a>
    </div>
    <div class="pkt-grid see-all" data-th-if="${seeAllLink}">
      <a class="pkt-cell pkt-cell--span12 pkt-txt-center" data-th-href="${seeAllLink.href}" data-th-text="${seeAllLink.text}"
        >See all</a
      >
    </div>
  </div>
</section>
