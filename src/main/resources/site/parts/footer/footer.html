<footer class="footer">
  <div class="section">
    <div class="pkt-container">
      <div class="pkt-grid">
        <div class="pkt-cell pkt-cell--span12 pkt-cell--span7-tablet-up pkt-cell--span5-tablet-big-up footer__column">
          <h3 data-th-if="${heading}" class="pkt-txt-22 pkt-txt-30--tablet-up has-text-white" data-th-text="${heading}"></h3>
          <p data-th-if="${description}" data-th-text="${description}"></p>
        </div>
        <div class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up pkt-cell--span3-tablet-big-up footer__column">
          <h4 class="footer__title is-small" data-th-text="${menuName}"></h4>
          <ul class="footer__content">
            <li data-th-each="element : ${menuElements}">
              <a data-th-href="${element.url}" data-th-text="${element.name}"></a>
            </li>
          </ul>
        </div>
        <div class="pkt-cell pkt-cell--span12 pkt-cell--span6-tablet-up pkt-cell--span3-tablet-big-up footer__column">
          <h4 class="footer__title is-small" data-th-text="${contactTitle}"></h4>
          <ul class="footer__content ul">
            <li data-th-if="${contactAddress}"><em class="icon icon--map"></em><span data-th-text="${contactAddress}"></span></li>
            <li data-th-if="${contactPhone}"><em class="icon icon--phone"></em><span data-th-text="${contactPhone}"></span></li>
            <li data-th-if="${contactEmail}">
              <em class="icon icon--email"></em><a data-th-href="${'mailto:' + contactEmail}" data-th-text="${contactEmail}"></a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <section class="section footer__bottom">
    <div class="pkt-container">
      <p data-th-if="${copyright}" class="pkt-txt-center">
        <small data-th-text="${copyright}"></small>
      </p>
      <p data-th-if="${appVersion}" class="pkt-txt-center">
        <small data-th-text="${portal.localize({'_key=parts.footer.appVersion'})}">App version</small>
        <small data-th-text="${appVersion}">Unknown</small>
      </p>
    </div>
  </section>
</footer>
